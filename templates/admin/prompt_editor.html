{% extends "sqladmin/layout.html" %}

{% block content %}
<div class="col-12">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Редактирование PROMPT.md</h3>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <textarea name="content" class="form-control" rows="30" 
                              style="font-family: monospace; font-size: 14px;">{{ content }}</textarea>
                </div>
                <div class="card-footer text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-save"></i> Сохранить файл
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
